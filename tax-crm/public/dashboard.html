<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Appeal CRM</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #080d1a;
  font-family: 'Inter', system-ui, sans-serif;
  color: #e2e8f0;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: #0d1526;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, #f97316, #ea580c);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 0.95rem; color: #fff;
}
.logo-text { font-size: 0.95rem; font-weight: 700; color: #fff; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.btn-sm {
  padding: 7px 14px; border-radius: 7px; font-size: 0.82rem; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.15s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #94a3b8; }
.btn-outline:hover { border-color: rgba(255,255,255,0.25); color: #e2e8f0; }
.btn-orange { background: #f97316; color: #fff; }
.btn-orange:hover { background: #ea580c; }

/* ── Stats row ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding: 24px 24px 0;
}
.stat-card {
  background: #0d1526;
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 18px 20px;
}
.stat-label { font-size: 0.72rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
.stat-value { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1; }
.stat-sub   { font-size: 0.75rem; color: #64748b; margin-top: 4px; }

/* ── Filters ── */
.filters {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 24px;
  flex-wrap: wrap;
}
.source-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
  cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: transparent;
  color: #64748b; transition: all 0.15s;
}
.pill.active, .pill:hover { background: #f97316; border-color: #f97316; color: #fff; }
.filter-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.08); margin: 0 4px; }

select.filter-select {
  background: #0d1526; border: 1px solid rgba(255,255,255,0.1);
  color: #94a3b8; border-radius: 8px; padding: 7px 12px; font-size: 0.82rem;
  cursor: pointer; outline: none;
}
input.filter-search {
  background: #0d1526; border: 1px solid rgba(255,255,255,0.1);
  color: #e2e8f0; border-radius: 8px; padding: 7px 14px; font-size: 0.82rem;
  outline: none; width: 220px; margin-left: auto;
}
input.filter-search::placeholder { color: #475569; }
input.filter-search:focus { border-color: rgba(249,115,22,0.5); }

/* ── Table ── */
.table-wrap {
  padding: 0 24px 40px;
  overflow-x: auto;
}
table {
  width: 100%; border-collapse: collapse; font-size: 0.84rem;
}
thead th {
  text-align: left; padding: 10px 14px;
  font-size: 0.72rem; font-weight: 600; color: #475569;
  text-transform: uppercase; letter-spacing: 0.06em;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  cursor: pointer; user-select: none; white-space: nowrap;
}
thead th:hover { color: #94a3b8; }
thead th .sort-arrow { margin-left: 4px; opacity: 0.5; }

tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.04);
  transition: background 0.1s;
  cursor: pointer;
}
tbody tr:hover { background: rgba(255,255,255,0.03); }
tbody tr.expanded { background: rgba(249,115,22,0.04); }
td { padding: 13px 14px; vertical-align: top; }

.td-date   { color: #64748b; white-space: nowrap; font-size: 0.8rem; }
.td-name   { font-weight: 600; color: #f1f5f9; }
.td-email  { color: #94a3b8; }
.td-addr   { color: #64748b; max-width: 160px; }
.td-source { white-space: nowrap; }

/* Source badges */
.badge {
  display: inline-block; padding: 3px 9px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.03em;
}
.badge-vt { background: rgba(34,197,94,0.15);  color: #4ade80; }
.badge-nh { background: rgba(56,189,248,0.15);  color: #38bdf8; }
.badge-wi { background: rgba(168,85,247,0.15);  color: #c084fc; }
.badge-tx { background: rgba(249,115,22,0.15);  color: #fb923c; }
.badge-uk { background: rgba(100,116,139,0.15); color: #94a3b8; }

/* Status badges */
.status-badge {
  display: inline-block; padding: 3px 9px; border-radius: 6px;
  font-size: 0.72rem; font-weight: 700;
}
.s-New          { background: rgba(249,115,22,0.15); color: #fb923c; }
.s-Contacted    { background: rgba(56,189,248,0.15); color: #38bdf8; }
.s-Qualified    { background: rgba(168,85,247,0.15); color: #c084fc; }
.s-Signed       { background: rgba(234,179,8,0.15);  color: #facc15; }
.s-Won          { background: rgba(34,197,94,0.15);  color: #4ade80; }
.s-Lost         { background: rgba(239,68,68,0.15);  color: #f87171; }
.s-Not-Qualified{ background: rgba(100,116,139,0.15);color: #94a3b8; }

/* ── Expanded row ── */
.expand-row td {
  background: #0a1020;
  border-bottom: 2px solid rgba(249,115,22,0.2);
  padding: 20px 24px;
}
.expand-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 2fr;
  gap: 20px;
  margin-bottom: 16px;
}
.expand-field label { font-size: 0.72rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 4px; }
.expand-field span  { font-size: 0.88rem; color: #cbd5e1; }
.expand-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
.expand-actions select, .expand-actions textarea {
  background: #080d1a; border: 1px solid rgba(255,255,255,0.1);
  color: #e2e8f0; border-radius: 8px; padding: 8px 12px; font-size: 0.85rem; outline: none;
}
.expand-actions textarea { width: 340px; resize: vertical; min-height: 60px; font-family: inherit; }
.expand-actions select:focus, .expand-actions textarea:focus { border-color: rgba(249,115,22,0.5); }
.btn-save { background: #f97316; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 0.85rem; font-weight: 700; cursor: pointer; }
.btn-save:hover { background: #ea580c; }
.btn-delete { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 8px 14px; font-size: 0.82rem; font-weight: 600; cursor: pointer; margin-left: auto; }
.btn-delete:hover { background: rgba(239,68,68,0.2); }

/* ── Empty state ── */
.empty-state {
  text-align: center; padding: 80px 24px; color: #475569;
}
.empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state h3 { font-size: 1.1rem; color: #64748b; margin-bottom: 6px; }

/* ── Loading ── */
.loading { text-align: center; padding: 60px; color: #475569; }

/* ── By-site row in stats ── */
.site-breakdown {
  padding: 0 24px 8px;
  display: flex; gap: 10px; flex-wrap: wrap;
}
.site-stat {
  background: #0d1526; border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px; padding: 8px 14px;
  font-size: 0.8rem; display: flex; align-items: center; gap: 8px;
}
.site-stat .n { font-weight: 800; color: #fff; }

/* ── Responsive ── */
@media(max-width:900px) {
  .stats-row { grid-template-columns: repeat(2,1fr); }
  .expand-grid { grid-template-columns: 1fr 1fr; }
}
@media(max-width:600px) {
  .stats-row { grid-template-columns: 1fr 1fr; }
  .header { padding: 0 16px; }
  .filters, .table-wrap, .stats-row, .site-breakdown { padding-left: 16px; padding-right: 16px; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">$</div>
    <div class="logo-text">Tax Appeal CRM</div>
  </div>
  <div class="header-actions">
    <a href="/api/export" class="btn-sm btn-outline">⬇ Export CSV</a>
    <a href="/logout" class="btn-sm btn-outline">Sign Out</a>
  </div>
</div>

<!-- Stats -->
<div class="stats-row" id="stats-row">
  <div class="stat-card"><div class="stat-label">Total Leads</div><div class="stat-value" id="s-total">—</div></div>
  <div class="stat-card"><div class="stat-label">New (Uncontacted)</div><div class="stat-value" id="s-new">—</div></div>
  <div class="stat-card"><div class="stat-label">Today</div><div class="stat-value" id="s-today">—</div></div>
  <div class="stat-card"><div class="stat-label">This Week</div><div class="stat-value" id="s-week">—</div></div>
</div>
<div class="site-breakdown" id="site-breakdown" style="margin-top:14px;"></div>

<!-- Filters -->
<div class="filters">
  <div class="source-pills" id="source-pills">
    <button class="pill active" data-source="all">All Sites</button>
    <button class="pill" data-source="Vermont">Vermont</button>
    <button class="pill" data-source="New Hampshire">New Hampshire</button>
    <button class="pill" data-source="Wisconsin">Wisconsin</button>
    <button class="pill" data-source="Texas">Texas</button>
  </div>
  <div class="filter-sep"></div>
  <select class="filter-select" id="status-filter">
    <option value="all">All Statuses</option>
    <option value="New">New</option>
    <option value="Contacted">Contacted</option>
    <option value="Qualified">Qualified</option>
    <option value="Signed">Signed</option>
    <option value="Won">Won</option>
    <option value="Lost">Lost</option>
    <option value="Not Qualified">Not Qualified</option>
  </select>
  <input class="filter-search" id="search-input" type="text" placeholder="Search name, email, address…">
</div>

<!-- Table -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Date</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Address</th>
        <th>County</th>
        <th>Source</th>
        <th>Prop Type</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="leads-tbody">
      <tr><td colspan="9" class="loading">Loading leads…</td></tr>
    </tbody>
  </table>
</div>

<script>
let leads = [];
let expandedId = null;
let currentFilters = { source: 'all', status: 'all', q: '' };

// ── Helpers ──────────────────────────────────────────────────────────────────

function sourceBadge(s) {
  const map = {
    'Vermont':       ['VT', 'badge-vt'],
    'New Hampshire': ['NH', 'badge-nh'],
    'Wisconsin':     ['WI', 'badge-wi'],
    'Texas':         ['TX', 'badge-tx'],
  };
  const [label, cls] = map[s] || [s || '?', 'badge-uk'];
  return `<span class="badge ${cls}">${label}</span>`;
}

function statusBadge(s) {
  const cls = 's-' + s.replace(/\s+/g, '-');
  return `<span class="status-badge ${cls}">${s}</span>`;
}

function fmtDate(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' }) +
         '<br><span style="color:#475569;">' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) + '</span>';
}

// ── Load stats ────────────────────────────────────────────────────────────────
async function loadStats() {
  const r = await fetch('/api/stats');
  const d = await r.json();
  document.getElementById('s-total').textContent = d.total;
  document.getElementById('s-new').textContent   = d.newLeads;
  document.getElementById('s-today').textContent = d.today;
  document.getElementById('s-week').textContent  = d.thisWeek;

  const colors = { 'Vermont':'badge-vt','New Hampshire':'badge-nh','Wisconsin':'badge-wi','Texas':'badge-tx' };
  const siteEl = document.getElementById('site-breakdown');
  siteEl.innerHTML = d.bySite.map(s =>
    `<div class="site-stat">
      <span class="badge ${colors[s.source]||'badge-uk'}">${s.source}</span>
      <span class="n">${s.n}</span> leads
    </div>`
  ).join('');
}

// ── Load leads ────────────────────────────────────────────────────────────────
async function loadLeads() {
  const params = new URLSearchParams();
  if (currentFilters.source !== 'all') params.set('source', currentFilters.source);
  if (currentFilters.status !== 'all') params.set('status', currentFilters.status);
  if (currentFilters.q)                params.set('q', currentFilters.q);

  const r = await fetch('/api/leads?' + params);
  const d = await r.json();
  leads = d.leads;
  renderTable();
}

// ── Render table ──────────────────────────────────────────────────────────────
function renderTable() {
  const tbody = document.getElementById('leads-tbody');
  if (!leads.length) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:60px;color:#475569;">
      <div style="font-size:2rem;margin-bottom:10px;">📭</div>
      <div style="font-weight:600;color:#64748b;">No leads yet</div>
      <div style="font-size:0.82rem;margin-top:4px;">Leads will appear here when contact forms are submitted</div>
    </td></tr>`;
    return;
  }

  tbody.innerHTML = '';
  for (const lead of leads) {
    const row = document.createElement('tr');
    row.dataset.id = lead.id;
    if (expandedId === lead.id) row.classList.add('expanded');
    row.innerHTML = `
      <td class="td-date">${fmtDate(lead.received_at)}</td>
      <td class="td-name">${esc(lead.name || '—')}</td>
      <td class="td-email" style="font-size:0.8rem;">${esc(lead.email || '—')}</td>
      <td style="color:#64748b;white-space:nowrap;">${esc(lead.phone || '—')}</td>
      <td class="td-addr" style="font-size:0.79rem;">${esc(lead.address || '—')}</td>
      <td style="color:#64748b;font-size:0.8rem;">${esc(lead.county || '—')}</td>
      <td class="td-source">${sourceBadge(lead.source)}</td>
      <td style="color:#64748b;font-size:0.79rem;">${esc(lead.property_type || '—')}</td>
      <td>${statusBadge(lead.status)}</td>
    `;
    row.addEventListener('click', () => toggleExpand(lead.id));
    tbody.appendChild(row);

    if (expandedId === lead.id) {
      const expRow = document.createElement('tr');
      expRow.className = 'expand-row';
      expRow.innerHTML = `<td colspan="9">${expandHTML(lead)}</td>`;
      tbody.appendChild(expRow);
    }
  }
}

function expandHTML(lead) {
  const statuses = ['New','Contacted','Qualified','Signed','Won','Lost','Not Qualified'];
  const opts = statuses.map(s => `<option value="${s}" ${lead.status===s?'selected':''}>${s}</option>`).join('');
  return `
    <div class="expand-grid">
      <div class="expand-field"><label>Email</label><span>${esc(lead.email||'—')}</span></div>
      <div class="expand-field"><label>Phone</label><span>${esc(lead.phone||'—')}</span></div>
      <div class="expand-field"><label>Address</label><span>${esc(lead.address||'—')}</span></div>
      <div class="expand-field"><label>Town</label><span>${esc(lead.town||'—')}</span></div>
      <div class="expand-field"><label>County</label><span>${esc(lead.county||'—')}</span></div>
      <div class="expand-field"><label>Assessed Value</label><span>${esc(lead.assessed_value||'—')}</span></div>
    </div>
    ${lead.message ? `<div style="margin-bottom:14px;"><div style="font-size:0.72rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;">Message</div><div style="font-size:0.86rem;color:#94a3b8;background:#080d1a;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.06);">${esc(lead.message)}</div></div>` : ''}
    <div class="expand-actions">
      <div>
        <label style="font-size:0.72rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px;">Status</label>
        <select id="status-select-${lead.id}">${opts}</select>
      </div>
      <div>
        <label style="font-size:0.72rem;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px;">Notes</label>
        <textarea id="notes-input-${lead.id}" placeholder="Add notes…">${esc(lead.notes||'')}</textarea>
      </div>
      <div style="margin-top:20px;">
        <button class="btn-save" onclick="saveLead(${lead.id})">Save</button>
      </div>
      <button class="btn-delete" onclick="deleteLead(${lead.id})">Delete</button>
    </div>
  `;
}

// ── Toggle expand ─────────────────────────────────────────────────────────────
function toggleExpand(id) {
  expandedId = expandedId === id ? null : id;
  renderTable();
}

// ── Save lead ─────────────────────────────────────────────────────────────────
async function saveLead(id) {
  const status = document.getElementById(`status-select-${id}`).value;
  const notes  = document.getElementById(`notes-input-${id}`).value;
  await fetch(`/api/leads/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status, notes })
  });
  await loadLeads();
  await loadStats();
}

// ── Delete lead ───────────────────────────────────────────────────────────────
async function deleteLead(id) {
  if (!confirm('Delete this lead? This cannot be undone.')) return;
  await fetch(`/api/leads/${id}`, { method: 'DELETE' });
  expandedId = null;
  await loadLeads();
  await loadStats();
}

// ── Escape HTML ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('.pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    currentFilters.source = p.dataset.source;
    expandedId = null;
    loadLeads();
  });
});

document.getElementById('status-filter').addEventListener('change', e => {
  currentFilters.status = e.target.value;
  expandedId = null;
  loadLeads();
});

let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    currentFilters.q = e.target.value;
    expandedId = null;
    loadLeads();
  }, 300);
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadStats();
loadLeads();
</script>
</body>
</html>
