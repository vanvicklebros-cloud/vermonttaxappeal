<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sequences — Tax Appeal CRM</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1526">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Tax CRM">
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080d1a; font-family: 'Inter', system-ui, sans-serif; color: #e2e8f0; min-height: 100vh; }

.header { background: #0d1526; border-bottom: 1px solid rgba(255,255,255,0.07); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg,#f97316,#ea580c); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 0.95rem; color: #fff; }
.logo-text { font-size: 0.95rem; font-weight: 700; color: #fff; }
.nav-links { display: flex; align-items: center; gap: 4px; margin-left: 24px; }
.nav-link { padding: 6px 14px; border-radius: 7px; font-size: 0.82rem; font-weight: 600; cursor: pointer; text-decoration: none; color: #64748b; transition: all 0.15s; }
.nav-link:hover { color: #e2e8f0; background: rgba(255,255,255,0.05); }
.nav-link.active { color: #f97316; background: rgba(249,115,22,0.1); }
.header-left { display: flex; align-items: center; }
.header-actions { display: flex; align-items: center; gap: 12px; }
.btn-sm { padding: 7px 14px; border-radius: 7px; font-size: 0.82rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
.btn-outline { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #94a3b8; }
.btn-outline:hover { border-color: rgba(255,255,255,0.25); color: #e2e8f0; }
.btn-orange { background: #f97316; color: #fff; }
.btn-orange:hover { background: #ea580c; }

/* ── Page content ── */
.page-header { padding: 28px 24px 0; display: flex; align-items: center; justify-content: space-between; }
.page-title { font-size: 1.4rem; font-weight: 900; color: #fff; }
.page-sub { font-size: 0.85rem; color: #64748b; margin-top: 4px; }

/* ── Sequence cards ── */
.sequences-grid { padding: 20px 24px 40px; display: flex; flex-direction: column; gap: 12px; }
.seq-card { background: #0d1526; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; overflow: hidden; transition: border-color 0.15s; }
.seq-card:hover { border-color: rgba(255,255,255,0.12); }
.seq-card.expanded { border-color: rgba(249,115,22,0.3); }
.seq-header { display: flex; align-items: center; gap: 14px; padding: 16px 20px; cursor: pointer; }
.seq-toggle { font-size: 0.8rem; color: #475569; width: 16px; flex-shrink: 0; transition: transform 0.15s; }
.seq-card.expanded .seq-toggle { transform: rotate(90deg); color: #f97316; }
.seq-info { flex: 1; min-width: 0; }
.seq-name { font-size: 1rem; font-weight: 700; color: #f1f5f9; }
.seq-meta { font-size: 0.78rem; color: #64748b; margin-top: 3px; }
.seq-badges { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.state-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
.sb-Vermont       { background: rgba(34,197,94,0.15);   color: #4ade80; }
.sb-New-Hampshire { background: rgba(56,189,248,0.15);   color: #38bdf8; }
.sb-Wisconsin     { background: rgba(168,85,247,0.15);   color: #c084fc; }
.sb-Texas         { background: rgba(249,115,22,0.15);   color: #fb923c; }
.sb-All           { background: rgba(100,116,139,0.15);  color: #94a3b8; }
.toggle-active { width: 36px; height: 20px; border-radius: 10px; border: none; cursor: pointer; position: relative; flex-shrink: 0; transition: background 0.2s; }
.toggle-active.on  { background: #f97316; }
.toggle-active.off { background: rgba(100,116,139,0.3); }
.toggle-active::after { content:''; position:absolute; width:14px; height:14px; border-radius:50%; background:#fff; top:3px; transition: left 0.2s; }
.toggle-active.on::after  { left: 19px; }
.toggle-active.off::after { left: 3px; }
.btn-delete-seq { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 5px 12px; font-size: 0.78rem; font-weight: 600; cursor: pointer; flex-shrink: 0; }
.btn-delete-seq:hover { background: rgba(239,68,68,0.2); }

/* ── Sequence body (steps + add) ── */
.seq-body { padding: 0 20px 20px; border-top: 1px solid rgba(255,255,255,0.05); }

/* Steps list */
.steps-list { margin-top: 16px; }
.step-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.step-connector { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; padding-top: 4px; }
.step-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 800; flex-shrink: 0; }
.dot-call  { background: rgba(56,189,248,0.2);  color: #38bdf8; }
.dot-email { background: rgba(168,85,247,0.2);  color: #c084fc; }
.step-line { width: 2px; background: rgba(255,255,255,0.06); flex: 1; min-height: 20px; margin-top: 4px; }
.step-content { flex: 1; min-width: 0; background: #080d1a; border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; padding: 12px 14px; }
.step-content-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.step-field label { display: block; font-size: 0.68rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
.step-field input, .step-field select, .step-field textarea {
  width: 100%; background: #0d1526; border: 1px solid rgba(255,255,255,0.08);
  color: #e2e8f0; border-radius: 6px; padding: 7px 10px; font-size: 0.82rem;
  outline: none; font-family: inherit;
}
.step-field textarea { resize: vertical; min-height: 60px; }
.step-field input:focus, .step-field select:focus, .step-field textarea:focus { border-color: rgba(249,115,22,0.4); }
.step-actions { display: flex; gap: 6px; margin-top: 8px; }
.btn-step-save { background: #f97316; color: #fff; border: none; border-radius: 6px; padding: 5px 14px; font-size: 0.78rem; font-weight: 700; cursor: pointer; }
.btn-step-save:hover { background: #ea580c; }
.btn-step-del  { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.2); border-radius: 6px; padding: 5px 10px; font-size: 0.78rem; cursor: pointer; }
.btn-step-del:hover { background: rgba(239,68,68,0.2); }
.step-num { font-size: 0.68rem; font-weight: 800; }

/* Add step form */
.add-step-form { margin-top: 16px; background: rgba(249,115,22,0.04); border: 1px dashed rgba(249,115,22,0.2); border-radius: 10px; padding: 16px; }
.add-step-form h4 { font-size: 0.78rem; font-weight: 700; color: #f97316; margin-bottom: 12px; }
.add-step-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.add-step-grid .full { grid-column: 1 / -1; }
.add-step-form .step-field label { color: #64748b; }
.btn-add-step { background: #f97316; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 0.82rem; font-weight: 700; cursor: pointer; margin-top: 12px; }
.btn-add-step:hover { background: #ea580c; }

/* ── Modal ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; padding: 40px 20px; }
.modal-overlay.open { display: flex; }
.modal { background: #0d1526; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; width: 100%; max-width: 480px; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.modal h2 { font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 18px; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 0.72rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.modal-field input, .modal-field select, .modal-field textarea { width: 100%; background: #080d1a; border: 1px solid rgba(255,255,255,0.1); color: #e2e8f0; border-radius: 8px; padding: 9px 12px; font-size: 0.88rem; outline: none; font-family: inherit; }
.modal-field textarea { resize: vertical; min-height: 70px; }
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: rgba(249,115,22,0.5); }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.06); }
.btn-cancel { background: transparent; border: 1px solid rgba(255,255,255,0.12); color: #94a3b8; border-radius: 8px; padding: 9px 18px; font-size: 0.85rem; font-weight: 600; cursor: pointer; }
.btn-cancel:hover { border-color: rgba(255,255,255,0.25); color: #e2e8f0; }
.modal-error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #f87171; border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; margin-bottom: 14px; display: none; }
.modal-error.show { display: block; }

.empty-state { text-align: center; padding: 80px 24px; color: #475569; }
.empty-state .icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state h3 { font-size: 1.1rem; color: #64748b; margin-bottom: 8px; }

/* ── Merge tag hint ── */
.merge-hint { font-size: 0.7rem; color: #475569; margin-top: 4px; }
.merge-hint span { background: rgba(255,255,255,0.06); border-radius: 3px; padding: 1px 5px; margin-right: 4px; font-family: monospace; cursor: pointer; }
.merge-hint span:hover { background: rgba(249,115,22,0.1); color: #f97316; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">
      <div class="logo-icon">$</div>
      <div class="logo-text">Tax Appeal CRM</div>
    </div>
    <nav class="nav-links">
      <a href="/" class="nav-link">Leads</a>
      <a href="/sequences" class="nav-link active">Sequences</a>
    </nav>
  </div>
  <div class="header-actions">
    <a href="/logout" class="btn-sm btn-outline">Sign Out</a>
  </div>
</div>

<div class="page-header">
  <div>
    <div class="page-title">Sequences</div>
    <div class="page-sub">Build outreach sequences with call and email tasks. Enroll leads from the dashboard.</div>
  </div>
  <button class="btn-sm btn-orange" id="btn-new-seq">+ New Sequence</button>
</div>

<div class="sequences-grid" id="sequences-grid">
  <div style="text-align:center;padding:40px;color:#475569;">Loading…</div>
</div>

<!-- New Sequence Modal -->
<div class="modal-overlay" id="new-seq-modal">
  <div class="modal">
    <h2>New Sequence</h2>
    <div class="modal-error" id="new-seq-error"></div>
    <div class="modal-field">
      <label>Sequence Name *</label>
      <input type="text" id="seq-name-input" placeholder="e.g. Vermont Inbound — 5 Step">
    </div>
    <div class="modal-field">
      <label>State / Market</label>
      <select id="seq-state-input">
        <option value="All">All States</option>
        <option value="Vermont">Vermont</option>
        <option value="New Hampshire">New Hampshire</option>
        <option value="Wisconsin">Wisconsin</option>
        <option value="Texas">Texas</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Description (optional)</label>
      <textarea id="seq-desc-input" placeholder="What's this sequence for?"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel-seq">Cancel</button>
      <button class="btn-sm btn-orange" id="btn-save-seq">Create Sequence</button>
    </div>
  </div>
</div>

<script>
let sequences = {};  // id → { seq, steps }
let expandedSeqs = new Set();

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function stateBadge(state) {
  const cls = 'sb-' + (state||'All').replace(/\s+/g,'-');
  return `<span class="state-badge ${cls}">${esc(state||'All')}</span>`;
}

// ── Load all sequences ─────────────────────────────────────────────────────────
async function loadSequences() {
  const seqs = await fetch('/api/sequences').then(r=>r.json());
  const grid = document.getElementById('sequences-grid');

  if (!seqs.length) {
    grid.innerHTML = `<div class="empty-state"><div class="icon">🗂</div><h3>No sequences yet</h3><div>Create your first sequence to start building outreach workflows.</div></div>`;
    return;
  }

  // Store and render
  seqs.forEach(s => {
    if (!sequences[s.id]) sequences[s.id] = { seq: s, steps: [] };
    else sequences[s.id].seq = s;
  });

  grid.innerHTML = seqs.map(s => renderSeqCard(s)).join('');

  // Load steps for expanded
  for (const id of expandedSeqs) {
    await loadSteps(id);
  }

  // Attach expand listeners
  grid.querySelectorAll('.seq-header').forEach(header => {
    const id = parseInt(header.closest('.seq-card').dataset.id);
    header.addEventListener('click', () => toggleSeq(id));
  });

  // Toggle active listeners
  grid.querySelectorAll('.toggle-active').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      const newActive = btn.classList.contains('off') ? 1 : 0;
      await fetch(`/api/sequences/${id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ active: newActive }) });
      await loadSequences();
    });
  });

  // Delete seq listeners
  grid.querySelectorAll('.btn-delete-seq').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      if (!confirm('Delete this sequence and all its steps?')) return;
      await fetch(`/api/sequences/${btn.dataset.id}`, { method:'DELETE' });
      expandedSeqs.delete(parseInt(btn.dataset.id));
      await loadSequences();
    });
  });
}

function renderSeqCard(s) {
  const isExp = expandedSeqs.has(s.id);
  const stepsData = sequences[s.id]?.steps || [];

  return `
  <div class="seq-card${isExp?' expanded':''}" data-id="${s.id}">
    <div class="seq-header">
      <div class="seq-toggle">▶</div>
      <div class="seq-info">
        <div class="seq-name">${esc(s.name)}</div>
        <div class="seq-meta">${s.step_count} step${s.step_count!==1?'s':''} · ${s.enrolled_count} active enrollment${s.enrolled_count!==1?'s':''}</div>
      </div>
      <div class="seq-badges">
        ${stateBadge(s.state)}
        <button class="toggle-active ${s.active?'on':'off'}" data-id="${s.id}" title="${s.active?'Active — click to pause':'Paused — click to activate'}"></button>
        <button class="btn-delete-seq" data-id="${s.id}">Delete</button>
      </div>
    </div>
    ${isExp ? `
    <div class="seq-body">
      <div class="steps-list" id="steps-list-${s.id}">
        ${stepsData.length ? renderSteps(stepsData, s.id) : '<div style="color:#475569;font-size:0.82rem;padding:8px 0;">No steps yet. Add the first step below.</div>'}
      </div>
      ${addStepForm(s.id)}
    </div>` : ''}
  </div>`;
}

function renderSteps(steps, seqId) {
  return steps.map((step, i) => {
    const isLast = i === steps.length - 1;
    const dotCls = step.step_type === 'call' ? 'dot-call' : 'dot-email';
    const icon   = step.step_type === 'call' ? '📞' : '✉️';
    const dayLabel = step.delay_days === 0 ? 'Day 0 (immediately)' : `Day +${step.delay_days}`;
    return `
    <div class="step-row">
      <div class="step-connector">
        <div class="step-dot ${dotCls}"><span class="step-num">${step.step_number}</span></div>
        ${!isLast ? '<div class="step-line"></div>' : ''}
      </div>
      <div class="step-content">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
          <span style="font-size:1rem;">${icon}</span>
          <span style="font-size:0.85rem;font-weight:700;color:#f1f5f9;">${esc(step.title)}</span>
          <span style="font-size:0.75rem;color:#64748b;margin-left:auto;">${dayLabel}</span>
        </div>
        <div class="step-content-row">
          <div class="step-field">
            <label>Type</label>
            <select id="stype-${step.id}" onchange="void 0">
              <option value="call"  ${step.step_type==='call' ?'selected':''}>📞 Call task</option>
              <option value="email" ${step.step_type==='email'?'selected':''}>✉️ Email task</option>
            </select>
          </div>
          <div class="step-field">
            <label>Delay (days after previous)</label>
            <input type="number" id="sdelay-${step.id}" value="${step.delay_days}" min="0">
          </div>
          <div class="step-field" style="grid-column:1/-1;">
            <label>Task Title / Instructions</label>
            <input type="text" id="stitle-${step.id}" value="${esc(step.title)}">
          </div>
          <div class="step-field" style="grid-column:1/-1;">
            <label>Email Subject (optional)</label>
            <input type="text" id="ssubject-${step.id}" value="${esc(step.template_subject||'')}" placeholder="Subject line with {{name}}, {{town}}, etc.">
          </div>
          <div class="step-field" style="grid-column:1/-1;">
            <label>Email Body / Call Script (optional)</label>
            <textarea id="sbody-${step.id}" rows="4" placeholder="Hi {{name}}, I noticed your property at {{address}}…">${esc(step.template_body||'')}</textarea>
            <div class="merge-hint">Merge tags: <span onclick="insertTag('sbody-${step.id}','{{name}}')">{{name}}</span><span onclick="insertTag('sbody-${step.id}','{{address}}')">{{address}}</span><span onclick="insertTag('sbody-${step.id}','{{town}}')">{{town}}</span><span onclick="insertTag('sbody-${step.id}','{{county}}')">{{county}}</span><span onclick="insertTag('sbody-${step.id}','{{assessed_value}}')">{{assessed_value}}</span><span onclick="insertTag('sbody-${step.id}','{{email}}')">{{email}}</span><span onclick="insertTag('sbody-${step.id}','{{phone}}')">{{phone}}</span></div>
          </div>
        </div>
        <div class="step-actions">
          <button class="btn-step-save" onclick="saveStep(${step.id})">Save Step</button>
          <button class="btn-step-del"  onclick="deleteStep(${step.id}, ${seqId})">Remove</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function addStepForm(seqId) {
  return `
  <div class="add-step-form">
    <h4>+ Add New Step</h4>
    <div class="add-step-grid">
      <div class="step-field">
        <label>Type</label>
        <select id="new-type-${seqId}">
          <option value="call">📞 Call task</option>
          <option value="email">✉️ Email task</option>
        </select>
      </div>
      <div class="step-field">
        <label>Delay (days after previous)</label>
        <input type="number" id="new-delay-${seqId}" value="0" min="0">
      </div>
      <div class="step-field full">
        <label>Task Title / Instructions *</label>
        <input type="text" id="new-title-${seqId}" placeholder="e.g. Intro call — ask about assessed value">
      </div>
      <div class="step-field full">
        <label>Email Subject (optional)</label>
        <input type="text" id="new-subject-${seqId}" placeholder="Subject with {{name}}, {{town}}…">
      </div>
      <div class="step-field full">
        <label>Email Body / Call Script (optional)</label>
        <textarea id="new-body-${seqId}" rows="4" placeholder="Hi {{name}}, I'm reaching out about your property at {{address}} in {{town}}…"></textarea>
        <div class="merge-hint">Merge tags: <span onclick="insertTag('new-body-${seqId}','{{name}}')">{{name}}</span><span onclick="insertTag('new-body-${seqId}','{{address}}')">{{address}}</span><span onclick="insertTag('new-body-${seqId}','{{town}}')">{{town}}</span><span onclick="insertTag('new-body-${seqId}','{{county}}')">{{county}}</span><span onclick="insertTag('new-body-${seqId}','{{assessed_value}}')">{{assessed_value}}</span><span onclick="insertTag('new-body-${seqId}','{{email}}')">{{email}}</span><span onclick="insertTag('new-body-${seqId}','{{phone}}')">{{phone}}</span></div>
      </div>
    </div>
    <button class="btn-add-step" onclick="addStep(${seqId})">Add Step</button>
  </div>`;
}

function insertTag(fieldId, tag) {
  const el = document.getElementById(fieldId);
  if (!el) return;
  const start = el.selectionStart, end = el.selectionEnd;
  el.value = el.value.slice(0, start) + tag + el.value.slice(end);
  el.setSelectionRange(start + tag.length, start + tag.length);
  el.focus();
}

async function loadSteps(seqId) {
  const steps = await fetch(`/api/sequences/${seqId}/steps`).then(r=>r.json());
  if (!sequences[seqId]) sequences[seqId] = { seq: {}, steps: [] };
  sequences[seqId].steps = steps;
  const list = document.getElementById(`steps-list-${seqId}`);
  if (list) {
    list.innerHTML = steps.length ? renderSteps(steps, seqId) : '<div style="color:#475569;font-size:0.82rem;padding:8px 0;">No steps yet. Add the first step below.</div>';
  }
}

async function toggleSeq(id) {
  if (expandedSeqs.has(id)) {
    expandedSeqs.delete(id);
    await loadSequences();
  } else {
    expandedSeqs.add(id);
    await loadSequences();
    await loadSteps(id);
  }
}

async function saveStep(stepId) {
  await fetch(`/api/steps/${stepId}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      step_type:        document.getElementById(`stype-${stepId}`)?.value,
      delay_days:       parseInt(document.getElementById(`sdelay-${stepId}`)?.value || 0),
      title:            document.getElementById(`stitle-${stepId}`)?.value,
      template_subject: document.getElementById(`ssubject-${stepId}`)?.value,
      template_body:    document.getElementById(`sbody-${stepId}`)?.value,
    })
  });
  // Find which seq this step belongs to
  for (const [seqId, data] of Object.entries(sequences)) {
    if (data.steps.some(s => s.id === stepId)) { await loadSteps(parseInt(seqId)); break; }
  }
}

async function deleteStep(stepId, seqId) {
  if (!confirm('Remove this step?')) return;
  await fetch(`/api/steps/${stepId}`, { method: 'DELETE' });
  await loadSteps(seqId);
  await loadSequences();
}

async function addStep(seqId) {
  const title = document.getElementById(`new-title-${seqId}`)?.value?.trim();
  if (!title) { alert('Step title is required.'); return; }
  const btn = document.querySelector(`[onclick="addStep(${seqId})"]`);
  if (btn) { btn.disabled = true; btn.textContent = 'Adding…'; }
  await fetch(`/api/sequences/${seqId}/steps`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      step_type:        document.getElementById(`new-type-${seqId}`)?.value,
      delay_days:       parseInt(document.getElementById(`new-delay-${seqId}`)?.value || 0),
      title,
      template_subject: document.getElementById(`new-subject-${seqId}`)?.value || '',
      template_body:    document.getElementById(`new-body-${seqId}`)?.value || '',
    })
  });
  await loadSteps(seqId);
  await loadSequences();
}

// ── New Sequence Modal ─────────────────────────────────────────────────────────
const modal    = document.getElementById('new-seq-modal');
const seqError = document.getElementById('new-seq-error');

document.getElementById('btn-new-seq').addEventListener('click', () => {
  document.getElementById('seq-name-input').value = '';
  document.getElementById('seq-desc-input').value = '';
  seqError.classList.remove('show');
  modal.classList.add('open');
  setTimeout(() => document.getElementById('seq-name-input').focus(), 50);
});
document.getElementById('btn-cancel-seq').addEventListener('click', () => modal.classList.remove('open'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('open'); });

document.getElementById('btn-save-seq').addEventListener('click', async () => {
  const name  = document.getElementById('seq-name-input').value.trim();
  const state = document.getElementById('seq-state-input').value;
  const desc  = document.getElementById('seq-desc-input').value.trim();
  if (!name) { seqError.textContent = 'Name is required.'; seqError.classList.add('show'); return; }
  const btn = document.getElementById('btn-save-seq');
  btn.textContent = 'Creating…'; btn.disabled = true;
  try {
    const r = await fetch('/api/sequences', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ name, state, description: desc }) });
    if (!r.ok) throw new Error((await r.json()).error || 'Error');
    const seq = await r.json();
    modal.classList.remove('open');
    expandedSeqs.add(seq.id);
    await loadSequences();
  } catch(err) {
    seqError.textContent = err.message; seqError.classList.add('show');
  } finally {
    btn.textContent = 'Create Sequence'; btn.disabled = false;
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
loadSequences();
</script>
