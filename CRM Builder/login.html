<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tax Appeal CRM — Login</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0d1526">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tax CRM">
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080d1a; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: #0d1526; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg,#f97316,#ea580c); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 1.1rem; color: #fff; }
  .logo-text { font-size: 1rem; font-weight: 700; color: #fff; }
  .logo-sub  { font-size: 0.75rem; color: #64748b; margin-top: 1px; }
  h1 { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 6px; }
  p  { font-size: 0.88rem; color: #64748b; margin-bottom: 28px; }
  label { display: block; font-size: 0.82rem; font-weight: 600; color: #94a3b8; margin-bottom: 6px; letter-spacing: 0.04em; text-transform: uppercase; }
  input[type=password] { width: 100%; padding: 12px 16px; background: #080d1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s; margin-bottom: 20px; }
  input[type=password]:focus { border-color: #f97316; }
  button { width: 100%; padding: 13px; background: linear-gradient(135deg,#f97316,#ea580c); color: #fff; font-size: 1rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.2s; }
  button:hover { opacity: 0.9; }
  .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; border-radius: 8px; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">$</div>
    <div>
      <div class="logo-text">Tax Appeal CRM</div>
      <div class="logo-sub">Lead Management Dashboard</div>
    </div>
  </div>
  <h1>Sign In</h1>
  <p>Enter your password to access leads.</p>
  <div id="error-msg" class="error" style="display:none;">Incorrect password. Try again.</div>
  <form method="POST" action="/login">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Enter password" autofocus>
    <button type="submit">Sign In →</button>
  </form>
</div>
<script>
  if (window.location.search.includes('error=1')) document.getElementById('error-msg').style.display = 'block';
</script>
</body>
</html>
